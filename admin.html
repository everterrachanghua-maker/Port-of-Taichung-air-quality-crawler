<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數據管理後台</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background: #f4f4f4; }
        .box { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .st-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        h2 { color: #2c3e50; text-align: center; }
        .input-group { margin-top: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 80px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .token-box { background: #fff3cd; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
        #status { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>台中港監測數據手動更新</h2>
        
        <div class="token-box">
            <label>GitHub Token:</label>
            <input type="password" id="gh-token" style="width:100%; box-sizing: border-box;" placeholder="貼上 Personal Access Token">
        </div>

        <div id="form-container"></div>

        <button onclick="uploadData()">確認更新並上傳 GitHub</button>
        <p id="status"></p>
    </div>

    <script>
        // 校正後的精確座標資料庫
        const stationConfigs = [
            { name: "港務中泊渠", lat: 24.26123, lng: 120.52042 },
            { name: "港務南突堤", lat: 24.23789, lng: 120.50368 },
            { name: "港務工作船渠", lat: 24.29064, lng: 120.51873 },
            { name: "台電清水", lat: 24.27041, lng: 120.57635 },
            { name: "台電梧棲", lat: 24.25412, lng: 120.53024 },
            { name: "台電龍井", lat: 24.20142, lng: 120.49844 },
            { name: "沙鹿", lat: 24.22955, lng: 120.57034, isCentral: true }
        ];

        const container = document.getElementById('form-container');
        stationConfigs.forEach((st, idx) => {
            container.innerHTML += `
                <div class="st-row">
                    <b style="color:#007bff">${st.name}</b>
                    <div class="input-group">
                        <div>PM2.5: <input type="text" id="pm25-${idx}" value="15"></div>
                        <div>PM10: <input type="text" id="pm10-${idx}" value="35"></div>
                        <div>O3: <input type="text" id="o3-${idx}" value="20"></div>
                        <div>CO: <input type="text" id="co-${idx}" value="0.3"></div>
                        <div>SO2: <input type="text" id="so2-${idx}" value="1.2"></div>
                        <div>NO2: <input type="text" id="no2-${idx}" value="12"></div>
                        ${st.isCentral ? `
                            <div>NMHC: <input type="text" id="nmhc-${idx}" value="0.2"></div>
                            <div>風速: <input type="text" id="ws-${idx}" value="1.5"></div>
                            <div>濕度: <input type="text" id="rh-${idx}" value="75"></div>
                        ` : ''}
                    </div>
                </div>
            `;
        });

        async function uploadData() {
            const token = document.getElementById('gh-token').value;
            if (!token) return alert("請輸入 Token");

            document.getElementById('status').innerText = "正在上傳...";
            const now = new Date().toLocaleString('zh-TW', { hour12: false });
            const payload = { tcc_data: [], central_data: [] };

            stationConfigs.forEach((st, idx) => {
                const item = {
                    station: st.name, lat: st.lat, lng: st.lng, time: now,
                    PM25: document.getElementById(`pm25-${idx}`).value,
                    PM10: document.getElementById(`pm10-${idx}`).value,
                    O3: document.getElementById(`o3-${idx}`).value,
                    CO: document.getElementById(`co-${idx}`).value,
                    SO2: document.getElementById(`so2-${idx}`).value,
                    NO2: document.getElementById(`no2-${idx}`).value
                };
                if (st.isCentral) {
                    item.NMHC = document.getElementById(`nmhc-${idx}`).value;
                    item.WindSpeed = document.getElementById(`ws-${idx}`).value;
                    item.RH = document.getElementById(`rh-${idx}`).value;
                    payload.central_data.push(item);
                } else {
                    payload.tcc_data.push(item);
                }
            });

            const repo = "everterrachanghua-maker/Port-of-Taichung-air-quality-crawler";
            const path = "air_quality.json";
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;

            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await getRes.json();
                
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "手動更新座標與數據",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 4)))),
                        sha: fileData.sha
                    })
                });

                if (putRes.ok) {
                    document.getElementById('status').innerText = "✅ 更新成功！位置已校正。";
                    document.getElementById('status').style.color = "green";
                } else {
                    document.getElementById('status').innerText = "❌ 失敗，請檢查 Token。";
                }
            } catch (err) {
                alert("錯誤: " + err);
            }
        }
    </script>
</body>
</html>
