<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台中港數據管理後台</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background: #f4f4f4; }
        .box { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .st-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        .st-row:last-child { border-bottom: none; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        label { display: inline-block; font-size: 0.9rem; font-weight: bold; color: #555; }
        .input-group { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .input-item { display: flex; align-items: center; gap: 5px; }
        input[type="text"], input[type="password"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        input[type="text"] { width: 60px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #218838; }
        .token-box { background: #fff3cd; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #ffeeba; }
        #status { text-align: center; font-weight: bold; margin-top: 15px; }
        .station-name { font-size: 1.1rem; color: #007bff; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>手動更新監測數據</h2>
        
        <div class="token-box">
            <label>GitHub Token:</label><br>
            <input type="password" id="gh-token" style="width:100%; margin-top:5px; box-sizing: border-box;" placeholder="貼上您的 Personal Access Token">
        </div>

        <div id="form-container">
            <!-- 這裡會由 JS 動態生成各測站輸入框 -->
        </div>

        <button onclick="uploadData()">確認更新並上傳 GitHub</button>
        <p id="status"></p>
    </div>

    <script>
        // 根據您提供的 TWD97 座標精確轉換後的經緯度
        const stations = [
            { name: "港務中泊渠", lat: 24.25841, lng: 120.52042 },
            { name: "港務南突堤", lat: 24.23514, lng: 120.50361 },
            { name: "港務工作船渠", lat: 24.28784, lng: 120.51883 },
            { name: "台電清水", lat: 24.26749, lng: 120.57635 },
            { name: "台電梧棲", lat: 24.25127, lng: 120.53024 },
            { name: "台電龍井", lat: 24.19875, lng: 120.49836 },
            { name: "沙鹿", lat: 24.22660, lng: 120.57034, isCentral: true }
        ];

        const container = document.getElementById('form-container');
        
        // 生成表單介面
        stations.forEach((st, idx) => {
            let extraFields = '';
            // 如果是沙鹿站，增加氣象欄位
            if (st.isCentral) {
                extraFields = `
                    <div class="input-item">NMHC: <input type="text" id="nmhc-${idx}" value="0.2"></div>
                    <div class="input-item">風速: <input type="text" id="ws-${idx}" value="1.5"></div>
                    <div class="input-item">濕度: <input type="text" id="rh-${idx}" value="75"></div>
                `;
            }

            container.innerHTML += `
                <div class="st-row">
                    <b class="station-name">${st.name}</b>
                    <div class="input-group">
                        <div class="input-item">PM2.5: <input type="text" id="pm25-${idx}" value="10"></div>
                        <div class="input-item">PM10: <input type="text" id="pm10-${idx}" value="25"></div>
                        <div class="input-item">O3: <input type="text" id="o3-${idx}" value="30"></div>
                        <div class="input-item">CO: <input type="text" id="co-${idx}" value="0.3"></div>
                        <div class="input-item">SO2: <input type="text" id="so2-${idx}" value="1.2"></div>
                        <div class="input-item">NO2: <input type="text" id="no2-${idx}" value="15"></div>
                        ${extraFields}
                    </div>
                </div>
            `;
        });

        async function uploadData() {
            const token = document.getElementById('gh-token').value;
            const statusEl = document.getElementById('status');
            if (!token) return alert("請輸入 GitHub Token");

            statusEl.innerText = "正在連線 GitHub 並準備上傳...";
            statusEl.style.color = "blue";

            // 1. 組裝符合 index.html 讀取的 JSON 結構
            const now = new Date().toLocaleString('zh-TW', { hour12: false });
            const payload = { tcc_data: [], central_data: [] };

            stations.forEach((st, idx) => {
                const item = {
                    station: st.name, 
                    lat: st.lat, 
                    lng: st.lng, 
                    time: now,
                    PM25: document.getElementById(`pm25-${idx}`).value,
                    PM10: document.getElementById(`pm10-${idx}`).value,
                    O3: document.getElementById(`o3-${idx}`).value,
                    CO: document.getElementById(`co-${idx}`).value,
                    SO2: document.getElementById(`so2-${idx}`).value,
                    NO2: document.getElementById(`no2-${idx}`).value
                };

                if (st.isCentral) {
                    item.NMHC = document.getElementById(`nmhc-${idx}`).value;
                    item.WindSpeed = document.getElementById(`ws-${idx}`).value;
                    item.RH = document.getElementById(`rh-${idx}`).value;
                    payload.central_data.push(item);
                } else {
                    payload.tcc_data.push(item);
                }
            });

            // 2. 透過 API 更新 GitHub
            const repo = "everterrachanghua-maker/Port-of-Taichung-air-quality-crawler";
            const path = "air_quality.json";
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;

            try {
                // 先獲取當前檔案的 SHA 碼
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await getRes.json();
                const sha = fileData.sha;

                // 提交更新
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "透過後台手動更新數據",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 4)))),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    statusEl.innerText = "✅ 數據更新成功！請等待 1 分鐘後重新整理地圖頁面。";
                    statusEl.style.color = "green";
                } else {
                    const errInfo = await putRes.json();
                    statusEl.innerText = "❌ 上傳失敗：" + (errInfo.message || "請檢查 Token 權限");
                    statusEl.style.color = "red";
                }
            } catch (err) {
                statusEl.innerText = "❌ 錯誤: " + err;
                statusEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
