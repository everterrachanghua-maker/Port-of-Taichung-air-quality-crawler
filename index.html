<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台中港空氣品質衛星監控</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 引入專業的座標轉換庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100%; }
        .map-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 10px 25px; border-radius: 30px; font-size: 1.1rem; border: 1px solid #4CAF50;
        }
    </style>
</head>
<body>
    <div class="map-title">台中港空氣品質監控 (TWD97 座標自動對位)</div>
    <div id="map"></div>

    <script>
        // 定義 TWD97 / TM2 中央經線 121度 的投影參數
        proj4.defs("EPSG:3826", "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +units=m +no_defs");

        const map = L.map('map').setView([24.25, 120.53], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function getColor(pm25) {
            const v = parseFloat(pm25);
            return v <= 15 ? "green" : v <= 35 ? "orange" : "red";
        }

        fetch('air_quality.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const allData = [...data.tcc_data, ...data.central_data];
                
                allData.forEach(st => {
                    // 將 TWD97 (x, y) 轉換為經緯度 (lng, lat)
                    const converted = proj4("EPSG:3826", "EPSG:4326", [st.x, st.y]);
                    const lat = converted[1];
                    const lng = converted[0];

                    const marker = L.circleMarker([lat, lng], {
                        radius: 12, fillColor: getColor(st.PM25), color: "#fff",
                        weight: 2, opacity: 1, fillOpacity: 0.8
                    }).addTo(map);

                    marker.bindPopup(`<b>${st.station}</b><br>時間: ${st.time}<hr>PM2.5: ${st.PM25}<br>PM10: ${st.PM10}`);
                });
            });
    </script>
</body>
</html>
