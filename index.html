<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台中港空氣品質衛星監控儀表板</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        #map { width: 100%; height: 100%; }

        /* 標題樣式 */
        .map-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 10px 25px; border-radius: 30px; font-size: 1.2rem;
            border: 1px solid #ffeb3b; pointer-events: none; white-space: nowrap;
        }

        /* 標記容器佈局 */
        .marker-container {
            display: flex; align-items: center; justify-content: center;
            position: relative; transform: translate(-50%, -50%);
        }

        /* 測站名稱樣式 */
        .station-name {
            color: white; font-weight: bold; font-size: 15px;
            text-shadow: 2px 2px 3px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-right: 8px; white-space: nowrap;
        }

        /* 圓點定位點 */
        .marker-dot {
            width: 14px; height: 14px; background-color: #ffeb3b;
            border: 2px solid #fff; border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 235, 59, 0.8); flex-shrink: 0;
            transition: all 0.3s;
        }

        /* 紅色閃爍預警樣式 */
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.8); }
            70% { transform: scale(1.4); box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
        .dot-danger {
            background-color: #ff0000 !important;
            box-shadow: 0 0 15px #ff0000 !important;
            animation: pulse-red 1s infinite;
        }

        /* 資訊表格樣式 */
        .info-table-card {
            margin-left: 10px; background: rgba(255, 255, 255, 0.95);
            border: 1px solid #333; border-collapse: collapse;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.6);
        }

        .info-table-card td {
            border: 1px solid #666; padding: 4px 7px;
            text-align: center; font-size: 12px; color: #000;
            white-space: nowrap; font-weight: bold;
        }

        .row-header td { background-color: #e9ecef; color: #333; font-size: 11px; }

        /* AQI 顏色標準類別 */
        .aqi-good { background-color: #99FF99 !important; }   /* 良好 - 淺綠 */
        .aqi-mod  { background-color: #FFFF99 !important; }   /* 普通 - 淺黃 */
        .aqi-sens { background-color: #FFCC99 !important; }   /* 敏感 - 淺橘 */
        .aqi-unh  { background-color: #FF9999 !important; }   /* 不良 - 淺紅 */
        .aqi-very { background-color: #CC99FF !important; }   /* 非常不良 - 淺紫 */
    </style>
</head>
<body>

    <div class="map-title">台中港空氣品質監控 - 自動預警儀表板</div>
    <div id="map"></div>

    <script>
        const twd97 = "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +units=m +no_defs";
        const wgs84 = "EPSG:4326";

        const map = L.map('map', { zoomControl: false }).setView([24.25, 120.53], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // 根據顏色標準表計算背景色
        function getAQIClass(type, value) {
            const v = parseFloat(value);
            if (isNaN(v)) return "";
            
            const ranges = {
                'O3':   [50, 125, 164, 204, 404],
                'PM25': [15.4, 35.4, 54.4, 150.4, 250.4],
                'PM10': [50, 100, 254, 354, 424],
                'CO':   [4.4, 9.4, 12.4, 15.4, 30.4],
                'SO2':  [20, 75, 185, 304, 604],
                'NO2':  [30, 100, 360, 649, 1249]
            };

            const r = ranges[type];
            if (!r) return "";
            if (v <= r[0]) return "aqi-good";
            if (v <= r[1]) return "aqi-mod";
            if (v <= r[2]) return "aqi-sens";
            if (v <= r[3]) return "aqi-unh";
            return "aqi-very";
        }

        fetch('air_quality.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                // 1. 尋找沙鹿站數據作為基準
                const shalu = data.central_data.find(s => s.station === "沙鹿") || {};
                const allStations = [...(data.tcc_data || []), ...(data.central_data || [])];

                allStations.forEach(st => {
                    if (!st.x || !st.y) return;

                    // 2. 判斷是否大於沙鹿站 1.5 倍
                    let isDanger = false;
                    const items = ['O3', 'PM25', 'PM10', 'CO', 'SO2', 'NO2'];
                    items.forEach(key => {
                        const currentVal = parseFloat(st[key]);
                        const shaluVal = parseFloat(shalu[key]);
                        if (!isNaN(currentVal) && !isNaN(shaluVal) && shaluVal > 0) {
                            if (currentVal > shaluVal * 1.5) isDanger = true;
                        }
                    });

                    // 座標轉換
                    const pos = proj4(twd97, wgs84, [parseFloat(st.x), parseFloat(st.y)]);
                    
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `
                            <div class="marker-container">
                                <div class="station-name">${st.station}</div>
                                <div class="marker-dot ${isDanger ? 'dot-danger' : ''}"></div>
                                <table class="info-table-card">
                                    <tr class="row-header">
                                        <td>測項</td><td>O₃</td><td>PM₂.₅</td><td>PM₁₀</td><td>CO</td><td>SO₂</td><td>NO₂</td>
                                    </tr>
                                    <tr class="row-value">
                                        <td style="font-weight:normal; font-size:10px; background:#f8f9fa">測值</td>
                                        <td class="${getAQIClass('O3', st.O3)}">${st.O3 || '-'}</td>
                                        <td class="${getAQIClass('PM25', st.PM25)}">${st.PM25 || '-'}</td>
                                        <td class="${getAQIClass('PM10', st.PM10)}">${st.PM10 || '-'}</td>
                                        <td class="${getAQIClass('CO', st.CO)}">${st.CO || '-'}</td>
                                        <td class="${getAQIClass('SO2', st.SO2)}">${st.SO2 || '-'}</td>
                                        <td class="${getAQIClass('NO2', st.NO2)}">${st.NO2 || '-'}</td>
                                    </tr>
                                </table>
                            </div>
                        `,
                        iconSize: [0, 0]
                    });

                    L.marker([pos[1], pos[0]], { icon: icon }).addTo(map);
                });
            });
    </script>
</body>
</html>
