<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台中港空氣品質衛星監控</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        #map { width: 100%; height: 100%; }
        .map-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.85); color: #fff;
            padding: 10px 25px; border-radius: 30px; font-size: 1.1rem;
            border: 1px solid #4CAF50; pointer-events: none; white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="map-title">台中港空氣品質監控 (TWD97 精確對位)</div>
    <div id="map"></div>

    <script>
        // 定義 TWD97 座標參數 (EPSG:3826)
        const twd97 = "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +units=m +no_defs";
        const wgs84 = "EPSG:4326";

        // 初始化地圖
        const map = L.map('map').setView([24.25, 120.53], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Satellite'
        }).addTo(map);

        function getColor(pm25) {
            const v = parseFloat(pm25);
            if (isNaN(v)) return "#999";
            return v <= 15 ? "#00ff00" : v <= 35 ? "#ffff00" : "#ff0000";
        }

        fetch('air_quality.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                console.log("讀取到的數據:", data);
                
                // 合併兩個陣列進行處理
                const tcc = data.tcc_data || [];
                const central = data.central_data || [];
                const allStations = [...tcc, ...central];

                allStations.forEach(st => {
                    // 檢查 JSON 裡面有沒有 x 和 y
                    if (st.x && st.y) {
                        try {
                            // 轉換座標：[x, y] 轉為 [經度, 緯度]
                            const pos = proj4(twd97, wgs84, [parseFloat(st.x), parseFloat(st.y)]);
                            const lng = pos[0];
                            const lat = pos[1];

                            const marker = L.circleMarker([lat, lng], {
                                radius: 12,
                                fillColor: getColor(st.PM25),
                                color: "#fff",
                                weight: 2,
                                fillOpacity: 0.8
                            }).addTo(map);

                            marker.bindPopup(`
                                <b style="font-size:1.1em">${st.station}</b><br>
                                <small>${st.time}</small><hr>
                                PM2.5: <b>${st.PM25}</b> μg/m³<br>
                                PM10: ${st.PM10} μg/m³<br>
                                O3: ${st.O3} ppb
                            `);
                        } catch (err) {
                            console.error("座標轉換錯誤:", st.station, err);
                        }
                    } else {
                        console.warn("站點缺乏 TWD97 座標資料:", st.station);
                    }
                });
            })
            .catch(err => console.error("檔案讀取失敗:", err));
    </script>
</body>
</html>
