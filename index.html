<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台中港空氣品質監控地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: "Microsoft JhengHei", sans-serif; }
        #map { width: 100%; height: 100%; }

        /* 地圖上方標題 */
        .map-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 10px 25px; border-radius: 30px; font-size: 1.2rem;
            border: 1px solid #ffeb3b; pointer-events: none; white-space: nowrap;
        }

        /* 自定義標記容器：[名稱] [點] [表格] */
        .marker-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transform: translate(-50%, -50%); /* 確保圓點中心對準座標 */
        }

        /* 左側測站名稱 */
        .station-name {
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-right: 8px;
            white-space: nowrap;
        }

        /* 中間黃色定位點 */
        .marker-dot {
            width: 14px;
            height: 14px;
            background-color: #ffeb3b;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 235, 59, 0.8);
            flex-shrink: 0;
        }

        /* 右側資訊表格卡片 */
        .info-table-card {
            margin-left: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #333;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
            border-collapse: collapse;
        }

        .info-table-card td {
            border: 1px solid #555;
            padding: 3px 8px;
            text-align: center;
            font-size: 12px;
            color: #000;
            white-space: nowrap;
        }

        /* 表格首列樣式 (測項) */
        .row-header {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        /* 表格第二列樣式 (測值) */
        .row-value {
            background-color: #fff;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="map-title">台中港空氣品質即時監測儀表板</div>
    <div id="map"></div>

    <script>
        // 定義 TWD97 座標參數
        const twd97 = "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +units=m +no_defs";
        const wgs84 = "EPSG:4326";

        // 初始化地圖
        const map = L.map('map', { zoomControl: false }).setView([24.25, 120.53], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        fetch('air_quality.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const allStations = [...(data.tcc_data || []), ...(data.central_data || [])];

                allStations.forEach(st => {
                    if (!st.x || !st.y) return;

                    // 座標轉換
                    const pos = proj4(twd97, wgs84, [parseFloat(st.x), parseFloat(st.y)]);
                    
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `
                            <div class="marker-container">
                                <div class="station-name">${st.station}</div>
                                <div class="marker-dot"></div>
                                <table class="info-table-card">
                                    <tr class="row-header">
                                        <td>測項</td><td>O₃</td><td>PM₂.₅</td><td>PM₁₀</td><td>CO</td><td>SO₂</td><td>NO₂</td>
                                    </tr>
                                    <tr class="row-value">
                                        <td style="font-weight:normal; font-size:10px">值</td>
                                        <td>${st.O3 || '-'}</td>
                                        <td>${st.PM25 || '-'}</td>
                                        <td>${st.PM10 || '-'}</td>
                                        <td>${st.CO || '-'}</td>
                                        <td>${st.SO2 || '-'}</td>
                                        <td>${st.NO2 || '-'}</td>
                                    </tr>
                                </table>
                            </div>
                        `,
                        iconSize: [0, 0],
                        iconAnchor: [0, 0] 
                    });

                    L.marker([pos[1], pos[0]], { icon: icon }).addTo(map);
                });
            });
    </script>
</body>
</html>
