name: Auto Air Quality Scraper

on:
  schedule:
    - cron: '*/10 * * * *'  # 建議改回每 10 分鐘執行一次，實現自動監控
  workflow_dispatch:      # 讓你可以手動按按鈕執行測試

permissions:
  contents: write         # 確保 Actions 有權限把檔案寫回專案

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 更新到 v4 解決警告問題

      - name: Set up Python
        uses: actions/setup-python@v5 # 更新到 v5 解決警告問題
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          # 這裡新增了 requests 用於發送 LINE 訊息
          pip install selenium webdriver-manager requests

      - name: Run crawler
        env:
          # 重點：將 GitHub Secrets 傳入 Python 程式碼中
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python crawler.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "更新最新數據與 LINE 預警" || echo "無資料變動"
          git push || echo "無資料可推送"
