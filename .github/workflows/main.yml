name: Auto Air Quality Scraper

on:
  schedule:
    - cron: '30 * * * *'  # 每小時的 30 分自動執行 (UTC時間，台灣時間可能會有誤差，但會定時執行)
  workflow_dispatch:      # 讓你可以手動按按鈕執行測試

permissions:
  contents: write         # 確保 Actions 有權限把檔案寫回專案

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run crawler
        run: python crawler.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "更新最新數據" || echo "無資料變動"
          git push || echo "無資料可推送"
