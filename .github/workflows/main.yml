name: Manual Data Alert System

on:
  push:
    paths:
      - 'air_quality.json'  # 關鍵：只有當數據檔更新時，才觸發 LINE 檢查
  workflow_dispatch:        # 保留手動強制執行按鈕

permissions:
  contents: write

jobs:
  alert_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Alert Logic
        env:
          # 從 GitHub Secrets 帶入 LINE 密鑰
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python check_manual_data.py
